<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DataURL/Blob 转下载链接工具</title>
    <link rel="stylesheet" href="misc-styles-code.css">
    <script>
    (function() {
        var links = [
            'https://cdn.staticfile.org/font-awesome/4.7.0/css/font-awesome.css',
            'https://cdn.bootcdn.net/ajax/libs/font-awesome/4.7.0/css/font-awesome.css',
            'https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.css',
            'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css',
            'https://unpkg.com/font-awesome@4.7.0/css/font-awesome.css'
        ];
        
        var currentIndex = 0;
        
        function loadCSS(url) {
            var link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = url;
            
            // 兼容低版本浏览器的 onerror 事件
            link.onerror = function() {
                // 移除加载失败的链接
                if (link.parentNode) {
                    link.parentNode.removeChild(link);
                }
                
                // 尝试下一个备用链接
                currentIndex++;
                if (currentIndex < links.length) {
                    loadCSS(links[currentIndex]);
                }
            };
            
            // 使用 onload 来确认链接加载成功
            link.onload = function() {
                // 成功加载，不做任何操作
            };
            
            document.head.appendChild(link);
        }
        
        // 开始加载第一个链接
        if (links.length > 0) {
            loadCSS(links[0]);
        }
    })();
    </script>
</head>
<body>
    <div class="container">
        <h1>DataURL/Blob/Base64 转下载链接工具</h1>
        
        <div class="input-section">
            <label for="dataurl-input">输入 DataURL/Blob/Base64 链接:</label>
            <textarea id="dataurl-input" placeholder="例如: data:text/plain;base64,SGVsbG8gV29ybGQ="></textarea>
        </div>
        
        <div class="button-row">
            <button id="parse-btn"><span>解析</span><i style="margin-left: 3px;" class="fa fa-refresh"></i></button>
            
            <button type="button" id="parse-file-btn">解析文件</button>
            <input type="file" id="file-input" accept=".txt,.text,.json" multiple style="display: none;">
            
            <button id="clear-btn" class="hidden">清除</button>
        </div>
        
        <div class="files-list">
            <h3>已解析文件列表:</h3>
            <div id="files-container">
                <div class="no-files">暂无解析的文件</div>
            </div>
        </div>
        
        <div class="convert-section">
            <h3>文件转链接功能:</h3>
            
            <div class="convert-row" style="margin-bottom: 0;">
                <button type="button" id="select-file-btn">选择文件</button>
                <input type="file" id="convert-file-input" style="display: none;" multiple>
                <span id="selected-file-name" class="selected-file">未选择文件</span>
            </div>
            
            <div class="convert-row">
                <button id="to-dataurl-btn" style="margin-top: 5px;">DataURL</button>
                <button id="to-blob-btn" style="margin-top: 5px;">Blob</button>
                <button id="to-base64-btn" style="margin-top: 5px;">Base64</button>
                <button id="to-json-btn" style="margin-top: 5px;">JSON</button>
                <button id="to-json2-btn" style="margin-top: 5px;">JSON2</button>
            </div>
            
            <div class="convert-result-section hidden" id="convert-result-container">
                <div class="result-header">
                    <span>转换结果</span>
                    <div class="result-button-row">
                        <button class="copy-result-btn">复制</button>
                        <button class="close-result-btn">关闭</button>
                    </div>
                </div>
                <textarea id="convert-result-textarea" readonly></textarea>
            </div>
            
            <div class="save-option">
                <label>
                    <input type="checkbox" id="save-as-file">
                    保存为文本文件（若文件过大可以勾选）
                </label>
            </div>
        </div>
    </div>

    <script src="miscscript.js"></script>
</body>
</html>
